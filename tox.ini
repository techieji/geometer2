[tox]
env_list =
    py313
    lint
    type
minversion = 4.50.3

[testenv]
description = run the tests with pytest
package = wheel
wheel_build_env = .pkg
deps =
    pytest>=6
commands =
    pytest {tty:--color=yes} {posargs}

[env.lint]
description = "run linters"
skip_install = true
deps = ["ruff"]
commands = [["ruff", "check"]]

[env.type]
description = "type check"
skip_install = true
deps = ["ty"]
commands = [["ty", "check"]]
